version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - storage_logs:/var/www/html/storage/logs
      - storage_framework:/var/www/html/storage/framework
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      - db
    environment:
      - APP_ENV=production
      - APP_DEBUG=true

  db:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_INITDB_DATABASE=api_db
    command: mongod --auth

volumes:
  mongodb_data:
  storage_logs:
  storage_framework:
  bootstrap_cache:
