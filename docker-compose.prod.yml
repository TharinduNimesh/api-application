services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: api-app
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_ENV=production
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
      - ./docker/apache/ssl:/etc/apache2/ssl:ro  # Add SSL certificates volume
      - ./docker/apache/sites:/etc/apache2/sites-available:ro  # Add virtual hosts volume
    user: "www-data:www-data"
    networks:
      - api_network

  mongodb:
    image: mongo:latest
    container_name: api-mongodb
    restart: unless-stopped
    command: ["mongod", "--tlsMode", "requireTLS", "--tlsCertificateKeyFile", "/etc/ssl/mongodb.pem"]
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${DB_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${DB_PASSWORD}
      - MONGO_INITDB_DATABASE=${DB_DATABASE}
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - ./docker/mongo/ssl:/etc/ssl:ro  # Add MongoDB SSL certificates volume
    networks:
      - api_network

volumes:
  mongodb_data:

networks:
  api_network:
    driver: bridge